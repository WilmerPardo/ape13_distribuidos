version: '3.8'

services:
  mdb-master:
    image: mariadb:10.11
    container_name: mdb-master
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: lab_db
    ports:
      - "3306:3306"
    volumes:
      - ./conf/master.cnf:/etc/mysql/conf.d/master.cnf
    networks:
      - db_network

  mdb-replica1:
    image: mariadb:10.11
    container_name: mdb-replica1
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    volumes:
      - ./conf/replica1.cnf:/etc/mysql/conf.d/replica.cnf
    networks:
      - db_network
    depends_on:
      - mdb-master

  mdb-replica2:
    image: mariadb:10.11
    container_name: mdb-replica2
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
    ports:
      - "3308:3306"
    volumes:
      - ./conf/replica2.cnf:/etc/mysql/conf.d/replica.cnf
    networks:
      - db_network
    depends_on:
      - mdb-master

networks:
  db_network:
    driver: bridge
